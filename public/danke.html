<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danke - Carefully</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #F8F9FA;
  color: #334155;
}
.container {
  text-align: center;
  max-width: 420px;
  padding: 2rem 1.5rem;
}
h1 {
  font-size: 2.5rem;
  font-weight: 500;
  color: #1e293b;
  font-style: italic;
  font-family: Georgia, 'Times New Roman', serif;
  margin-bottom: 0.5rem;
}
.badge {
  display: inline-block;
  background: linear-gradient(to right, #dcfce7, #d1fae5);
  color: #15803d;
  border: 1px solid #bbf7d0;
  font-size: 0.75rem;
  padding: 0.25rem 0.75rem;
  border-radius: 9999px;
  margin-bottom: 1.5rem;
}
p {
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}
a {
  display: inline-block;
  background: #2563eb;
  color: #fff;
  text-decoration: none;
  padding: 0.625rem 1.5rem;
  border-radius: 0.75rem;
  font-size: 0.875rem;
  font-weight: 500;
  transition: background 0.2s;
}
a:hover { background: #1d4ed8; }
.hint {
  font-size: 0.75rem;
  color: #94a3b8;
  margin-top: 1rem;
}
</style>
</head>
<body>
<div class="container">
  <h1>Carefully</h1>
  <div class="badge">Zahlung erfolgreich</div>
  <p>Vielen Dank! Deine 30 Nachrichten wurden freigeschaltet.</p>
  <a href="/">Zur&uuml;ck zum Chat</a>
  <p class="hint">Du wirst in 5 Sekunden automatisch weitergeleitet.</p>
</div>
<script>setTimeout(function(){ window.location.href = '/'; }, 5000);</script>
</body>
</html>
